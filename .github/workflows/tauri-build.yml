name: Build Windows Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI
        run: bun add -d @tauri-apps/cli@^2

      - name: Generate icons (if app-icon.png exists)
        shell: pwsh
        run: |
          if (Test-Path "app-icon.png") {
            bunx tauri icon app-icon.png
          } else {
            Write-Host "No app-icon.png found, generating placeholder..."
            New-Item -ItemType Directory -Force -Path src-tauri/icons
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/tauri-apps/tauri/dev/examples/api/src-tauri/icons/icon.png" -OutFile "placeholder.png"
            bunx tauri icon placeholder.png
          }

      - name: Build Tauri app (MSI + NSIS installer + portable)
        id: tauri_build
        continue-on-error: true
        run: bunx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create portable .exe (copy main binary)
        id: portable
        if: steps.tauri_build.outcome == 'success'
        continue-on-error: true
        shell: pwsh
        run: |
          $portableDir = "portable-build"
          New-Item -ItemType Directory -Force -Path $portableDir
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "*.exe" -File | Where-Object { $_.Name -notlike "*setup*" } | Select-Object -First 1
          if (-not $exe) { throw "No main .exe found in src-tauri/target/release" }
          Copy-Item $exe.FullName -Destination "$portableDir/FB-Viral-Traffic-Engine-Pro-Portable.exe"

      - name: Verify Tauri build artifacts
        id: verify
        shell: pwsh
        run: |
          $ok = $true
          $report = @()

          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
          $nsis = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          $portable = Get-ChildItem -Path "portable-build" -Filter "*.exe" -ErrorAction SilentlyContinue

          if ($msi) {
            $report += "[OK]    MSI installer: $($msi.Name) ($([math]::Round($msi.Length/1MB,2)) MB)"
          } else {
            $report += "[FAIL]  MSI installer not found"
            $ok = $false
          }

          if ($nsis) {
            $report += "[OK]    NSIS installer: $($nsis.Name) ($([math]::Round($nsis.Length/1MB,2)) MB)"
          } else {
            $report += "[FAIL]  NSIS installer not found"
            $ok = $false
          }

          if ($portable) {
            $report += "[OK]    Portable .exe: $($portable.Name) ($([math]::Round($portable.Length/1MB,2)) MB)"
          } else {
            $report += "[FAIL]  Portable .exe not found"
            $ok = $false
          }

          $tauriOutcome = "${{ steps.tauri_build.outcome }}"
          $report += ""
          $report += "Tauri build step outcome: $tauriOutcome"

          $summary = @()
          if ($ok -and $tauriOutcome -eq "success") {
            $summary += "## ✅ Tauri Windows build succeeded"
            $summary += ""
            $summary += "All expected artifacts were produced:"
          } else {
            $summary += "## ❌ Tauri Windows build FAILED"
            $summary += ""
            $summary += "One or more artifacts are missing. Check the **Build Tauri app** step above for the root cause (Rust compile error, missing icon, signing failure, etc.)."
            $summary += ""
            $summary += "Status report:"
          }
          $summary += '```'
          $summary += $report
          $summary += '```'

          $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          $report | ForEach-Object { Write-Host $_ }

          if (-not $ok -or $tauriOutcome -ne "success") {
            Write-Error "Build verification failed — see status report above."
            exit 1
          } else {
            Write-Host ""
            Write-Host "✅ Build verification passed — all Windows artifacts are ready."
          }

      - name: Upload installer artifacts
        if: always() && steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload portable .exe
        if: always() && steps.verify.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: portable-build/*.exe

      - name: Prepare release details
        id: release_info
        if: steps.verify.outcome == 'success'
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/v*") {
            $tag = "${{ github.ref_name }}"
          } else {
            $tag = "v0.0.${{ github.run_number }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=Windows Build $tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.verify.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            portable-build/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
