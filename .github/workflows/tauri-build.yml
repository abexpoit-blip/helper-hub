name: Build Windows Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Install Tauri CLI
        run: bun add -d @tauri-apps/cli@^2

      - name: Generate icons (if app-icon.png exists)
        shell: pwsh
        run: |
          if (Test-Path "app-icon.png") {
            bunx tauri icon app-icon.png
          } else {
            Write-Host "No app-icon.png found, generating placeholder..."
            New-Item -ItemType Directory -Force -Path src-tauri/icons
            # Download a default placeholder icon
            Invoke-WebRequest -Uri "https://raw.githubusercontent.com/tauri-apps/tauri/dev/examples/api/src-tauri/icons/icon.png" -OutFile "placeholder.png"
            bunx tauri icon placeholder.png
          }

      - name: Build Tauri app (MSI + NSIS installer + portable)
        run: bunx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create portable .exe (copy main binary)
        shell: pwsh
        run: |
          $portableDir = "portable-build"
          New-Item -ItemType Directory -Force -Path $portableDir
          Copy-Item "src-tauri/target/release/fb-viral-traffic-engine-pro.exe" -Destination "$portableDir/FB-Viral-Traffic-Engine-Pro-Portable.exe"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: portable-build/*.exe

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            portable-build/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
